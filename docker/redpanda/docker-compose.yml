# @format

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda-broker
    ports:
      - "9092:9092"
      - "9644:9644"
    command:
      - redpanda
      - start
      - --node-id
      - "0"
      - --kafka-addr
      - EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:9093
      - --advertise-kafka-addr
      - EXTERNAL://localhost:9092,INTERNAL://redpanda:9093
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - localhost:8082
      - --schema-registry-addr
      - 0.0.0.0:8081
      - --smp
      - "1"
      - --memory
      - "1G"
      - --overprovisioned
      - --check=false
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - redpanda-net
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9093 # Dùng INTERNAL listener
    restart: unless-stopped
    networks:
      - redpanda-net

networks:
  redpanda-net:
    driver: bridge

volumes:
  redpanda-data:
